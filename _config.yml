# Hexo Configuration
# 文档: https://hexo.io/zh-cn/docs/configuration.html

# 站点信息
title: KSSKU 的博客
subtitle: '记录动漫与代码的日常'
description: '二次元｜技术｜动漫｜编程'
keywords: '二次元,动漫,编程,Cloudflare,Hexo'
author: kssku
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://blog.kssku.top
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# 目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# 首页分页
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类 & 标签
default_category: uncategorized
category_map:
tag_map:

# 元数据生成器
meta_generator: true

# 日期格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# 分页
per_page: 10
pagination_dir: page

# 包含/排除文件
include:
exclude:
ignore:

# 主题
theme: butterfly

# 部署（无需配置，Cloudflare Pages 自动处理）
deploy:
  type: ''
